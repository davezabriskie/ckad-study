apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app
  name: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      initContainers:
        - image: busybox
          name: checker
          command: ['sh', '-c', 'env']
          restartPolicy: Never
          envFrom:
            - configMapRef:
                name: app-cfg
      containers:
        - image: nginx:1.21
          name: nginx
          envFrom:
            - configMapRef:
                name: app-cfg
