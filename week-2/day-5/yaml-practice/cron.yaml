apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: "Allow"
  jobTemplate:
    spec:
      parallelism: 2
      completions: 3
      template:
        spec:
          restartPolicy: Never
          containers:
            - image: busybox
              name: sleeper
              command: ['sh', '-c', 'echo "Starting..."; sleep 6; echo "I awaken"; sleep 1; echo "I yield"']
