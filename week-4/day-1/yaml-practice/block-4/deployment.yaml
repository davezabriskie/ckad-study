apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cache
  name: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache
  strategy: {}
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
      - image: redis:7
        name: redis
        ports:
          - containerPort: 6379
status: {}
