apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: all-server-egress-dns-only
spec:
  podSelector:
    matchLabels:
      app: server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
