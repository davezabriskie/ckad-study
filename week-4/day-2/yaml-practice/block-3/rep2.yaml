apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-ing
spec:
  rules:
  - host: shop.example.com
    http:
      paths:
      - backend:
          service:
            name: web-svc
            port:
              number: 80
        path: /api
        pathType: Prefix
      - backend:
          service:
            name: web-svc
            port:
              number: 80
        path: /
        pathType: Prefix
