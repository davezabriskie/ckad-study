apiVersion: v1
kind: Secret
metadata:
  name: tls-secret
stringData:
  tls.crt: test
  tls.key: test-key

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tls-ing
spec:
  rules:
  - host: shop.example.com
    http:
      paths:
      - backend:
          service:
            name: web-svc
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - shop.example.com
    secretName: tls-secret
