apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: worker
  name: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  strategy: {}
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - image: busybox
        name: busybox
        command: ['sh', '-c', 'sleep 3600']
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
