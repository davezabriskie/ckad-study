apiVersion: batch/v1
kind: CronJob
metadata:
  name: report
spec:
  jobTemplate:
    metadata:
      name: report
    spec:
      template:
        metadata: {}
        spec:
          containers:
          - image: busybox
            name: report
            command: ['sh', '-c', 'echo report']
          restartPolicy: OnFailure
  schedule: 0 8 * * 1
