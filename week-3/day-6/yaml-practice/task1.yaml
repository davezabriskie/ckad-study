apiVersion: v1
kind: ConfigMap
metadata:
  name: app-cfg
data:
  ENV: prod
  LOG_LEVEL: warn
  REGION: us-east-1

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        worker: yeppers
    spec:
      containers:
        - name: nginx
          ports:
            - containerPort: 80
          image: nginx:1.21
          envFrom:
            - configMapRef:
                name: app-cfg
          readinessProbe:
            httpGet:
              path: /
              port: 80
