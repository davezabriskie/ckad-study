apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-cfg
data:
  server.conf: |
    server {
      listen 80;
      location / {
          return 200 "ok\n";
      }
    }

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-worker
  template:
    metadata:
      labels:
        app: web-worker
    spec:
      volumes:
        - name: nginx-cfg-mnt
          configMap:
            name: nginx-cfg
      containers:
        - name: web-worker-node
          image: nginx:1.21
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: /etc/nginx/conf.d
              name: nginx-cfg-mnt
          readinessProbe:
            httpGet:
              path: /
              port: 80
