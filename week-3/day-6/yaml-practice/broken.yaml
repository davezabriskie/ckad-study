apiVersion: v1
kind: ConfigMap
metadata:
  name: cm1
data:
  foo: bar
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: nginx
          image: nginx:1.21
          volumeMounts:
            - mountPath /etc/app
              name: cfg
      volumes:
        - name: cfg
          configMap:
            name: cm1
