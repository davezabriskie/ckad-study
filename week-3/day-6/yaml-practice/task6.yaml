apiVersion: v1
kind: ConfigMap
metadata:
  name: stack-cfg
data:
  APP_ENV: production
  LOG_LEVEL: error

---

apiVersion: v1
kind: Secret
metadata:
  name: stack-secret
stringData:
  API_TOKEN: tok-xyz

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stack
  template:
    metadata:
      labels:
        app: stack
    spec:
      volumes:
        - name: stack-mnt
          configMap:
            name: stack-cfg
      containers:
        - name: stack-mnt
          image: nginx:1.21
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: stack-secret
                  key: API_TOKEN
          volumeMounts:
            - mountPath: /etc/app
              name: stack-mnt
          readinessProbe:
            httpGet:
              path: /
              port: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi

---

apiVersion: v1
kind: Service
metadata:
  name: stack-svc
spec:
  type: ClusterIP
  selector:
    app: stack
  ports:
    - port: 80
      targetPort: 80
