apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-client-vol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db
      db: postgres
  template:
    metadata:
      labels:
        app: db
        db: postgres
    spec:
      volumes:
        - name: db-secret-mnt
          secret:
            secretName: db-secret
      containers:
        - image: postgres:latest
          name: postgres-instance
          volumeMounts:
            - mountPath: /etc/db-creds
              name: db-secret-mnt
          env:
            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust
