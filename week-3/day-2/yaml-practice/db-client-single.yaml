apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-client-single
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db
      db: postgres
  template:
    metadata:
      labels:
        app: db
        db: postgres
    spec:
      containers:
        - image: postgres:latest
          name: postgres-instance
          env:
            - name: POSTGRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
