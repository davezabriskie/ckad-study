apiVersion: v1
kind: Pod
metadata:
  name: configured-app
  labels:
    block: "4"
    task: "complex"
spec:
  containers:
    - name: configured-app
      image: nginx:1.21
      env:
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL

